version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: telegram_postgres
    restart: always
    environment:
      POSTGRES_DB: telegram_clone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - telegram_network

  redis:
    image: redis:7-alpine
    container_name: telegram_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - telegram_network

  app:
    build:
      context: .
      dockerfile: Dockerfile.txt
    container_name: telegram_app
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: telegram_clone
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      FRONTEND_URL: ${FRONTEND_URL}
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
      - data:/app/data
    networks:
      - telegram_network

volumes:
  postgres_data:
  redis_data:
  uploads:
  logs:
  data:

networks:
  telegram_network:
    driver: bridge
