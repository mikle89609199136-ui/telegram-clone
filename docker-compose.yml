version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: craheapp
      POSTGRES_PASSWORD: craheapp
      POSTGRES_DB: craheapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U craheapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  api:
    build: .
    command: npm run api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://craheapp:craheapp@postgres:5432/craheapp
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      JWT_SECRET: devsecret
      JWT_REFRESH_SECRET: devrefreshsecret
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  ws:
    build: .
    command: npm run ws
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://craheapp:craheapp@postgres:5432/craheapp
      REDIS_URL: redis://redis:6379
      JWT_SECRET: devsecret
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  media:
    build: .
    command: npm run media
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://craheapp:craheapp@postgres:5432/craheapp
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      JWT_SECRET: devsecret
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  ai:
    build: .
    command: npm run ai
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: postgresql://craheapp:craheapp@postgres:5432/craheapp
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: devsecret
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
