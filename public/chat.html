<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Craheapp Messenger</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      background: #0f0f18;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .app {
      width: 100%;
      height: 100%;
      max-width: 1400px;
      max-height: 900px;
      display: flex;
      background: rgba(26,26,46,0.8);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px #000;
      overflow: hidden;
      border: 1px solid #2f2f50;
    }
    /* Sidebar */
    .sidebar {
      width: 320px;
      background: #1a1a2e;
      border-right: 1px solid #2f2f50;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2f2f50;
    }
    .logo {
      font-size: 20px;
      font-weight: 600;
      background: linear-gradient(135deg, #7a5cff, #ff5ad6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .new-chat-btn {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: #7a5cff;
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
      transition: 0.2s;
    }
    .new-chat-btn:hover { background: #8b6eff; }
    .search-box {
      padding: 15px 20px;
      position: relative;
    }
    .search-box i {
      position: absolute;
      left: 35px;
      top: 27px;
      color: #b0b0d0;
    }
    .search-box input {
      width: 280px;
      height: 40px;
      padding: 12px 20px 12px 45px;
      background: #1a1a2e;
      border: 1px solid #2f2f50;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      outline: none;
    }
    .search-box input::placeholder { color: #b0b0d0; }
    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 10px;
    }
    .chat-item {
      display: flex;
      align-items: center;
      height: 72px;
      padding: 12px;
      border-radius: 16px;
      margin-bottom: 5px;
      cursor: pointer;
      transition: 0.2s;
      position: relative;
    }
    .chat-item:hover, .chat-item.active { background: #24243f; }
    .chat-avatar {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: linear-gradient(135deg, #7a5cff, #ff5ad6);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 20px;
      margin-right: 12px;
      overflow: hidden;
    }
    .chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .chat-info { flex: 1; }
    .chat-name { color: white; font-weight: 500; margin-bottom: 4px; }
    .chat-last-msg { color: #b0b0d0; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
    .chat-time { color: #b0b0d0; font-size: 11px; position: absolute; top: 12px; right: 12px; }

    /* Main chat area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(15,15,24,0.6);
    }
    .chat-header {
      height: 64px;
      padding: 0 25px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2f2f50;
    }
    .header-left { display: flex; align-items: center; }
    .header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, #7a5cff, #ff5ad6);
      margin-right: 15px;
      overflow: hidden;
    }
    .header-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .header-info h3 { color: white; font-size: 16px; font-weight: 600; }
    .header-info p { color: #b0b0d0; font-size: 12px; }
    .header-actions { display: flex; gap: 15px; }
    .header-actions button {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: transparent;
      border: none;
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
    }
    .header-actions button:hover { background: #2f2f50; }

    /* Messages container */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .message {
      max-width: 520px;
      display: flex;
      margin-bottom: 5px;
      animation: fadeIn 0.16s ease;
    }
    .message.sent { align-self: flex-end; }
    .message.received { align-self: flex-start; }
    .message-bubble {
      padding: 10px 14px;
      border-radius: 16px;
      position: relative;
      word-wrap: break-word;
    }
    .message.sent .message-bubble { background: #7a5cff; color: white; border-bottom-right-radius: 4px; }
    .message.received .message-bubble { background: #2b2b45; color: white; border-bottom-left-radius: 4px; }
    .message-time { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 4px; text-align: right; }
    .reply-context { font-size: 12px; padding: 4px 8px; background: rgba(0,0,0,0.3); border-radius: 8px; margin-bottom: 4px; color: #b0b0d0; cursor: pointer; }
    .message-reactions { display: flex; gap: 5px; margin-top: 5px; }
    .reaction { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 2px 8px; font-size: 12px; display: flex; align-items: center; gap: 4px; cursor: pointer; transition: 0.12s; }
    .reaction:hover { transform: scale(1.1); }
    .message-media { max-width: 250px; border-radius: 12px; cursor: pointer; }

    /* Composer */
    .composer {
      height: 72px;
      padding: 12px 25px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-top: 1px solid #2f2f50;
    }
    .composer-actions { display: flex; gap: 10px; }
    .composer-actions button {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: transparent;
      border: 1px solid #2f2f50;
      color: #b0b0d0;
      font-size: 20px;
      cursor: pointer;
      transition: 0.2s;
    }
    .composer-actions button:hover { background: #2f2f50; color: white; }
    .composer-input {
      flex: 1;
      display: flex;
      align-items: center;
      background: #1a1a2e;
      border-radius: 24px;
      padding: 0 15px;
      border: 1px solid #2f2f50;
    }
    .composer-input input {
      flex: 1;
      background: none;
      border: none;
      padding: 12px 0;
      color: white;
      font-size: 15px;
      outline: none;
    }
    .composer-input input::placeholder { color: #b0b0d0; }
    .composer-input button { background: none; border: none; color: #b0b0d0; font-size: 22px; cursor: pointer; }
    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: #7a5cff;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
      transition: 0.12s;
    }
    .send-btn:hover { background: #8b6eff; transform: scale(1.03); }
    .send-btn:active { transform: scale(0.97); }

    /* Right AI Panel */
    .ai-panel {
      width: 360px;
      background: #141428;
      border-left: 1px solid #2f2f50;
      padding: 20px;
      overflow-y: auto;
      display: none;
    }
    .ai-panel.visible { display: block; }
    .ai-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .ai-avatar {
      width: 48px; height: 48px; border-radius: 24px; background: linear-gradient(135deg,#7a5cff,#ff5ad6);
      display: flex; align-items: center; justify-content: center; color: white; font-size: 24px;
    }
    .ai-title { color: white; font-size: 18px; font-weight: 600; }
    .ai-subtitle { color: #b0b0d0; font-size: 12px; }
    .ai-button {
      width: 100%; padding: 12px; background: #1f1f33; border: 1px solid #2f2f50; border-radius: 12px; color: white; font-size: 14px; cursor: pointer; margin-bottom: 10px; transition: 0.12s;
    }
    .ai-button:hover { background: #2a2a44; transform: scale(1.02); }

    /* Auth modal */
    .auth-overlay {
      position: fixed; top:0; left:0; right:0; bottom:0; background: #0f0f18; display: flex; justify-content: center; align-items: center; z-index: 1000;
    }
    .auth-card {
      background: #1a1a2e; padding: 40px; border-radius: 24px; width: 420px; border: 1px solid #2f2f50;
    }
    .auth-card h2 { color: white; margin-bottom: 20px; text-align: center; }
    .auth-card input {
      width: 100%; height: 44px; padding: 12px; margin-bottom: 15px; background: #0f0f18; border: 1px solid #2f2f50; border-radius: 12px; color: white;
    }
    .auth-card button {
      width: 100%; height: 48px; background: #7a5cff; border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; margin-bottom: 10px;
    }
    .auth-card button.register { background: #ff5ad6; }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { width: 100%; position: absolute; left: -100%; transition: left 0.3s; z-index: 100; }
      .sidebar.open { left: 0; }
      .app { border-radius: 0; }
      .ai-panel { width: 100%; position: absolute; right: -100%; transition: right 0.3s; }
      .ai-panel.open { right: 0; }
      .chat-area { width: 100%; }
    }

    @keyframes fadeIn {
      from { opacity:0; transform: translateY(10px); }
      to { opacity:1; transform: translateY(0); }
    }
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#7a5cff; border-radius:10px; }
  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="logo">Craheapp</span>
        <button class="new-chat-btn" id="newChatBtn"><i class="fas fa-plus"></i></button>
      </div>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Search chats..." id="searchInput">
      </div>
      <div class="chat-list" id="chatList"></div>
    </div>

    <!-- Main chat area -->
    <div class="chat-area">
      <div class="chat-header">
        <div class="header-left">
          <button class="menu-toggle" id="menuToggle" style="background:none; border:none; color:white; font-size:24px; margin-right:10px; display:none;"><i class="fas fa-bars"></i></button>
          <div class="header-avatar" id="headerAvatar"><img src="" alt=""></div>
          <div class="header-info">
            <h3 id="headerName">Select a chat</h3>
            <p id="headerStatus"></p>
          </div>
        </div>
        <div class="header-actions">
          <button id="callBtn"><i class="fas fa-phone"></i></button>
          <button id="videoCallBtn"><i class="fas fa-video"></i></button>
          <button id="aiAssistantBtn"><i class="fas fa-robot"></i></button>
          <button id="profileMenuBtn"><i class="fas fa-user-circle"></i></button>
        </div>
      </div>

      <div class="messages-container" id="messagesContainer"></div>

      <div class="composer">
        <div class="composer-actions">
          <button id="emojiBtn"><i class="fas fa-smile"></i></button>
          <button id="attachBtn"><i class="fas fa-paperclip"></i></button>
          <button id="voiceBtn"><i class="fas fa-microphone"></i></button>
        </div>
        <div class="composer-input">
          <input type="text" id="messageInput" placeholder="Message..." disabled>
          <button id="sendBtn" disabled><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    </div>

    <!-- Right AI Panel -->
    <div class="ai-panel" id="aiPanel">
      <div class="ai-header">
        <div class="ai-avatar"><i class="fas fa-robot"></i></div>
        <div>
          <div class="ai-title">CRAHEAPP.BOT</div>
          <div class="ai-subtitle">Always online</div>
        </div>
      </div>
      <button class="ai-button" id="aiSummarize"><i class="fas fa-align-left"></i> Summarize chat</button>
      <button class="ai-button" id="aiTranslate"><i class="fas fa-language"></i> Translate message</button>
      <button class="ai-button" id="aiSmartReply"><i class="fas fa-comment-dots"></i> Smart reply</button>
      <button class="ai-button" id="aiGenerate"><i class="fas fa-magic"></i> Generate text</button>
    </div>
  </div>

  <!-- Auth modal -->
  <div class="auth-overlay" id="authOverlay">
    <div class="auth-card">
      <h2 id="authTitle">Login</h2>
      <input type="text" id="authUsername" placeholder="Username">
      <input type="password" id="authPassword" placeholder="Password">
      <button id="authActionBtn">Login</button>
      <button class="register" id="authToggleBtn">Register</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ==================== Global state ====================
    let token = localStorage.getItem('token');
    let currentUser = null;
    let currentChat = null;
    let chats = [];
    let messages = [];
    let socket = null;

    // DOM elements
    const authOverlay = document.getElementById('authOverlay');
    const authTitle = document.getElementById('authTitle');
    const authUsername = document.getElementById('authUsername');
    const authPassword = document.getElementById('authPassword');
    const authActionBtn = document.getElementById('authActionBtn');
    const authToggleBtn = document.getElementById('authToggleBtn');
    const chatList = document.getElementById('chatList');
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const emojiBtn = document.getElementById('emojiBtn');
    const attachBtn = document.getElementById('attachBtn');
    const voiceBtn = document.getElementById('voiceBtn');
    const newChatBtn = document.getElementById('newChatBtn');
    const callBtn = document.getElementById('callBtn');
    const videoCallBtn = document.getElementById('videoCallBtn');
    const aiAssistantBtn = document.getElementById('aiAssistantBtn');
    const profileMenuBtn = document.getElementById('profileMenuBtn');
    const headerName = document.getElementById('headerName');
    const headerStatus = document.getElementById('headerStatus');
    const headerAvatarImg = document.querySelector('#headerAvatar img');
    const aiPanel = document.getElementById('aiPanel');
    const aiSummarize = document.getElementById('aiSummarize');
    const aiTranslate = document.getElementById('aiTranslate');
    const aiSmartReply = document.getElementById('aiSmartReply');
    const aiGenerate = document.getElementById('aiGenerate');
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');

    // Responsive: show menu toggle on mobile
    if (window.innerWidth <= 768) {
      menuToggle.style.display = 'block';
    }

    menuToggle?.addEventListener('click', () => {
      sidebar.classList.toggle('open');
    });

    // ==================== Auth ====================
    let isLogin = true;
    authToggleBtn.addEventListener('click', () => {
      isLogin = !isLogin;
      authTitle.textContent = isLogin ? 'Login' : 'Register';
      authActionBtn.textContent = isLogin ? 'Login' : 'Register';
    });

    authActionBtn.addEventListener('click', async () => {
      const username = authUsername.value.trim();
      const password = authPassword.value.trim();
      if (!username || !password) return alert('Fill all fields');
      const url = isLogin ? '/api/login' : '/api/register';
      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        token = data.token;
        currentUser = data.user;
        localStorage.setItem('token', token);
        authOverlay.style.display = 'none';
        initSocket();
        loadChats();
        messageInput.disabled = false;
        sendBtn.disabled = false;
      } catch (err) {
        alert(err.message);
      }
    });

    if (token) {
      authOverlay.style.display = 'none';
      initSocket();
      loadChats();
      messageInput.disabled = false;
      sendBtn.disabled = false;
    } else {
      authOverlay.style.display = 'flex';
    }

    // ==================== Socket.IO ====================
    function initSocket() {
      socket = io({ auth: { token } });
      socket.on('message:new', (msg) => {
        if (msg.chatId === currentChat?.id) {
          messages.push(msg);
          renderMessages();
        }
        updateChatLastMessage(msg);
      });
      socket.on('message:edit', (msg) => {
        // handle edit
      });
      socket.on('message:delete', (msgId) => {
        // handle delete
      });
      socket.on('typing', ({ username, isTyping }) => {
        if (currentChat) headerStatus.textContent = isTyping ? `${username} typing...` : 'online';
      });
    }

    // ==================== API ====================
    async function fetchWithAuth(url, options = {}) {
      options.headers = {
        ...options.headers,
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      };
      const res = await fetch(url, options);
      if (res.status === 401) {
        localStorage.removeItem('token');
        authOverlay.style.display = 'flex';
        throw new Error('Unauthorized');
      }
      return res;
    }

    async function loadChats() {
      try {
        const res = await fetchWithAuth('/api/chats');
        chats = await res.json();
        renderChatList();
      } catch (err) { console.error(err); }
    }

    async function loadMessages(chatId) {
      try {
        const res = await fetchWithAuth(`/api/messages/${chatId}`);
        messages = await res.json();
        renderMessages();
      } catch (err) { console.error(err); }
    }

    async function sendMessage(content, type = 'text', mediaUrl = null, replyTo = null) {
      if (!currentChat) return;
      const payload = { chatId: currentChat.id, content, type, mediaUrl, replyTo };
      try {
        const res = await fetchWithAuth('/api/messages', { method: 'POST', body: JSON.stringify(payload) });
        const newMsg = await res.json();
        messages.push(newMsg);
        renderMessages();
        // Already broadcast via socket, but we optimistically added
      } catch (err) { console.error(err); }
    }

    // ==================== UI ====================
    function renderChatList() {
      chatList.innerHTML = '';
      chats.forEach(chat => {
        const chatName = chat.type === 'direct'
          ? (chat.participants.find(p => p !== currentUser?.id)?.username || 'User')
          : chat.name;
        const lastMsg = chat.lastMessage?.content || 'No messages yet';
        const time = chat.lastMessage ? new Date(chat.lastMessage.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
        const avatar = chat.type === 'direct'
          ? `https://ui-avatars.com/api/?name=${chatName}&background=7a5cff&color=fff`
          : 'https://ui-avatars.com/api/?name=Group&background=ff5ad6&color=fff';
        const item = document.createElement('div');
        item.className = `chat-item ${currentChat?.id === chat.id ? 'active' : ''}`;
        item.dataset.id = chat.id;
        item.innerHTML = `
          <div class="chat-avatar"><img src="${avatar}" alt=""></div>
          <div class="chat-info">
            <div class="chat-name">${chatName}</div>
            <div class="chat-last-msg">${lastMsg}</div>
          </div>
          <div class="chat-time">${time}</div>
        `;
        item.addEventListener('click', () => selectChat(chat));
        chatList.appendChild(item);
      });
    }

    function selectChat(chat) {
      currentChat = chat;
      const chatName = chat.type === 'direct'
        ? (chat.participants.find(p => p !== currentUser?.id)?.username || 'User')
        : chat.name;
      headerName.textContent = chatName;
      headerAvatarImg.src = chat.type === 'direct'
        ? `https://ui-avatars.com/api/?name=${chatName}&background=7a5cff&color=fff`
        : 'https://ui-avatars.com/api/?name=Group&background=ff5ad6&color=fff';
      loadMessages(chat.id);
      socket.emit('joinChat', chat.id);
      // Hide sidebar on mobile after selection
      if (window.innerWidth <= 768) sidebar.classList.remove('open');
    }

    function renderMessages() {
      messagesContainer.innerHTML = '';
      messages.forEach(msg => {
        const div = document.createElement('div');
        div.className = `message ${msg.senderId === currentUser?.id ? 'sent' : 'received'}`;
        const time = new Date(msg.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        let mediaHtml = '';
        if (msg.type === 'image' && msg.mediaUrl) {
          mediaHtml = `<img src="${msg.mediaUrl}" class="message-media" onclick="window.open('${msg.mediaUrl}')">`;
        } else if (msg.type === 'video' && msg.mediaUrl) {
          mediaHtml = `<video src="${msg.mediaUrl}" controls class="message-media"></video>`;
        } else if (msg.type === 'file' && msg.mediaUrl) {
          mediaHtml = `<a href="${msg.mediaUrl}" target="_blank" class="message-media"><i class="fas fa-file"></i> ${msg.mediaUrl.split('/').pop()}</a>`;
        } else if (msg.type === 'voice' && msg.mediaUrl) {
          mediaHtml = `<audio src="${msg.mediaUrl}" controls></audio>`;
        }
        const replyHtml = msg.replyTo ? `<div class="reply-context">Replying to a message</div>` : '';
        const reactionsHtml = Object.entries(msg.reactions || {}).map(([emoji, users]) =>
          `<span class="reaction" onclick="addReaction('${msg.id}', '${emoji}')">${emoji} ${users.length}</span>`
        ).join('');
        div.innerHTML = `
          <div class="message-bubble">
            ${replyHtml}
            ${mediaHtml}
            ${msg.content || ''}
            <div class="message-time">${time} ${msg.edited ? '(edited)' : ''}</div>
            <div class="message-reactions">${reactionsHtml}</div>
          </div>
        `;
        messagesContainer.appendChild(div);
      });
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function updateChatLastMessage(msg) {
      const chat = chats.find(c => c.id === msg.chatId);
      if (chat) {
        chat.lastMessage = msg;
        renderChatList();
      }
    }

    // ==================== Composer ====================
    sendBtn.addEventListener('click', () => {
      const text = messageInput.value.trim();
      if (text) {
        sendMessage(text);
        messageInput.value = '';
      }
    });

    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendBtn.click();
      if (currentChat) {
        socket.emit('typing', { chatId: currentChat.id, isTyping: true });
        clearTimeout(window.typingTimeout);
        window.typingTimeout = setTimeout(() => {
          socket.emit('typing', { chatId: currentChat.id, isTyping: false });
        }, 2000);
      }
    });

    // Emoji (mock)
    emojiBtn.addEventListener('click', () => {
      messageInput.value += '😊';
    });

    // Attach (mock)
    attachBtn.addEventListener('click', () => {
      alert('File attachment – mock');
    });

    // Voice (mock)
    voiceBtn.addEventListener('click', () => {
      alert('Voice message – mock');
    });

    // AI Panel
    aiAssistantBtn.addEventListener('click', () => {
      aiPanel.classList.toggle('visible');
    });

    aiSummarize.addEventListener('click', async () => {
      const res = await fetchWithAuth('/api/ai/summarize', { method: 'POST', body: JSON.stringify({ messages }) });
      const data = await res.json();
      alert(data.summary);
    });

    aiTranslate.addEventListener('click', async () => {
      const lang = prompt('Target language (e.g., en, ru):');
      const text = prompt('Text to translate:');
      if (!lang || !text) return;
      const res = await fetchWithAuth('/api/ai/translate', { method: 'POST', body: JSON.stringify({ text, targetLanguage: lang }) });
      const data = await res.json();
      alert(data.translated);
    });

    aiSmartReply.addEventListener('click', async () => {
      const res = await fetchWithAuth('/api/ai/chat', { method: 'POST', body: JSON.stringify({ message: 'Generate reply', chatId: currentChat?.id }) });
      const data = await res.json();
      messageInput.value = data.reply;
    });

    aiGenerate.addEventListener('click', async () => {
      const prompt = prompt('Enter a prompt:');
      if (!prompt) return;
      const res = await fetchWithAuth('/api/ai/generate', { method: 'POST', body: JSON.stringify({ prompt }) });
      const data = await res.json();
      alert(data.generated);
    });

    // Profile menu (logout)
    profileMenuBtn.addEventListener('click', () => {
      if (confirm('Logout?')) {
        localStorage.removeItem('token');
        window.location.reload();
      }
    });

    // New chat (mock)
    newChatBtn.addEventListener('click', () => {
      alert('New chat – would open contact list');
    });

    // Calls (mock)
    callBtn.addEventListener('click', () => alert('Voice call – mock'));
    videoCallBtn.addEventListener('click', () => alert('Video call – mock'));

    // Reaction function (needs to be global for onclick)
    window.addReaction = async function(messageId, emoji) {
      await fetchWithAuth(`/api/messages/${messageId}/reactions`, {
        method: 'POST',
        body: JSON.stringify({ emoji, action: 'add' })
      });
      loadMessages(currentChat.id);
    };
  </script>
</body>
</html>
