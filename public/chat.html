<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Craheapp Messenger</title>
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Emoji Picker (Apple style) -->
  <script src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.21.1/index.js" type="module"></script>
  <!-- Socket.IO client -->
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji';
    }

    body {
      background: #0f0f18;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #app {
      width: 100%;
      height: 100%;
      max-width: 1600px;
      max-height: 1000px;
      display: flex;
      background: #1a1a2e;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      border: 1px solid #2f2f50;
    }

    /* ========== SIDEBAR ========== */
    .sidebar {
      width: 320px;
      background: #1a1a2e;
      border-right: 1px solid #2f2f50;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 20px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2f2f50;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #7a5cff, #ff5ad6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sidebar-actions {
      display: flex;
      gap: 8px;
    }

    .sidebar-actions button {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: transparent;
      border: 1px solid #2f2f50;
      color: #b0b0d0;
      font-size: 20px;
      cursor: pointer;
      transition: 0.15s;
    }

    .sidebar-actions button:hover {
      background: #2f2f50;
      color: white;
    }

    .sidebar-tabs {
      display: flex;
      padding: 12px 16px;
      gap: 8px;
      border-bottom: 1px solid #2f2f50;
    }

    .tab-btn {
      flex: 1;
      height: 40px;
      background: transparent;
      border: none;
      border-radius: 10px;
      color: #b0b0d0;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.15s;
    }

    .tab-btn.active {
      background: #7a5cff;
      color: white;
    }

    .search-box {
      padding: 12px 16px;
      position: relative;
    }

    .search-box i {
      position: absolute;
      left: 28px;
      top: 24px;
      color: #b0b0d0;
      font-size: 16px;
    }

    .search-box input {
      width: 100%;
      height: 44px;
      padding: 0 16px 0 42px;
      background: #0f0f18;
      border: 1px solid #2f2f50;
      border-radius: 12px;
      color: white;
      font-size: 15px;
      outline: none;
    }

    .search-box input::placeholder { color: #b0b0d0; }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
    }

    .chat-item {
      display: flex;
      align-items: center;
      height: 72px;
      padding: 8px 12px;
      border-radius: 16px;
      margin-bottom: 4px;
      cursor: pointer;
      transition: 0.15s;
      position: relative;
    }

    .chat-item:hover,
    .chat-item.active {
      background: #2a2a44;
    }

    .chat-avatar {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: linear-gradient(135deg, #7a5cff, #ff5ad6);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 20px;
      margin-right: 12px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .chat-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .chat-info {
      flex: 1;
      min-width: 0;
    }

    .chat-name {
      color: white;
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-last-msg {
      color: #b0b0d0;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-time {
      color: #b0b0d0;
      font-size: 11px;
      position: absolute;
      top: 12px;
      right: 12px;
    }

    .chat-badge {
      background: #ff5ad6;
      color: white;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 10px;
      position: absolute;
      bottom: 12px;
      right: 12px;
    }

    /* ========== MAIN CHAT AREA ========== */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #141425;
    }

    .chat-header {
      height: 70px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2f2f50;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .header-avatar {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: linear-gradient(135deg, #7a5cff, #ff5ad6);
      overflow: hidden;
    }

    .header-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .header-info h3 {
      color: white;
      font-size: 18px;
      font-weight: 600;
    }

    .header-info p {
      color: #b0b0d0;
      font-size: 13px;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .header-actions button {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: transparent;
      border: 1px solid #2f2f50;
      color: white;
      font-size: 20px;
      cursor: pointer;
      transition: 0.15s;
    }

    .header-actions button:hover {
      background: #7a5cff;
      border-color: #7a5cff;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .empty-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #b0b0d0;
      gap: 20px;
    }

    .empty-chat i {
      font-size: 80px;
      color: #7a5cff;
    }

    .empty-chat h2 {
      color: white;
      font-size: 28px;
    }

    .empty-chat p {
      font-size: 16px;
    }

    .empty-chat button {
      background: #7a5cff;
      border: none;
      padding: 14px 32px;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
    }

    /* ========== MESSAGE BUBBLES ========== */
    .message {
      max-width: 600px;
      display: flex;
      margin-bottom: 4px;
      animation: fadeIn 0.2s ease;
    }

    .message.sent {
      align-self: flex-end;
    }

    .message.received {
      align-self: flex-start;
    }

    .message-bubble {
      padding: 10px 16px;
      border-radius: 18px;
      position: relative;
      word-wrap: break-word;
    }

    .message.sent .message-bubble {
      background: #7a5cff;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.received .message-bubble {
      background: #25253f;
      color: white;
      border-bottom-left-radius: 4px;
    }

    .message-time {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
      text-align: right;
    }

    .message-reply {
      font-size: 13px;
      padding: 4px 8px;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      border-left: 3px solid #ff5ad6;
    }

    .message-media {
      max-width: 300px;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 4px;
    }

    .message-reactions {
      display: flex;
      gap: 5px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .reaction {
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: 0.1s;
    }

    .reaction:hover {
      background: #7a5cff;
      transform: scale(1.05);
    }

    /* ========== COMPOSER ========== */
    .composer {
      padding: 16px 24px;
      border-top: 1px solid #2f2f50;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .composer-actions {
      display: flex;
      gap: 8px;
    }

    .composer-actions button {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: transparent;
      border: 1px solid #2f2f50;
      color: #b0b0d0;
      font-size: 22px;
      cursor: pointer;
      transition: 0.15s;
    }

    .composer-actions button:hover {
      background: #2f2f50;
      color: white;
    }

    .composer-input {
      flex: 1;
      display: flex;
      align-items: center;
      background: #1f1f33;
      border-radius: 24px;
      padding: 0 16px;
      border: 1px solid #2f2f50;
    }

    .composer-input input {
      flex: 1;
      background: none;
      border: none;
      padding: 14px 0;
      color: white;
      font-size: 16px;
      outline: none;
    }

    .composer-input input::placeholder { color: #b0b0d0; }

    .composer-input button {
      background: none;
      border: none;
      color: #b0b0d0;
      font-size: 24px;
      cursor: pointer;
      padding: 0 4px;
    }

    .send-btn {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      background: #7a5cff;
      border: none;
      color: white;
      font-size: 22px;
      cursor: pointer;
      transition: 0.15s;
    }

    .send-btn:hover {
      background: #8b6eff;
      transform: scale(1.03);
    }

    .send-btn:active {
      transform: scale(0.97);
    }

    .send-btn:disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    /* ========== RIGHT PANEL (AI / INFO) ========== */
    .right-panel {
      width: 340px;
      background: #1a1a2e;
      border-left: 1px solid #2f2f50;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .right-panel.hidden {
      display: none;
    }

    .panel-header {
      padding: 20px;
      border-bottom: 1px solid #2f2f50;
    }

    .panel-header h3 {
      color: white;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .panel-content {
      padding: 20px;
      flex: 1;
    }

    .ai-message {
      background: #25253f;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      color: #b0b0d0;
    }

    .ai-button {
      width: 100%;
      padding: 12px;
      background: #25253f;
      border: 1px solid #2f2f50;
      border-radius: 14px;
      color: white;
      font-size: 15px;
      cursor: pointer;
      margin-bottom: 10px;
      transition: 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ai-button:hover {
      background: #7a5cff;
    }

    /* ========== MODALS ========== */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .modal-card {
      background: #1f1f33;
      border-radius: 28px;
      width: 460px;
      max-width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 30px;
      border: 1px solid #2f2f50;
      color: white;
    }

    .modal-card h2 {
      margin-bottom: 24px;
      font-size: 24px;
    }

    .modal-card input,
    .modal-card textarea {
      width: 100%;
      padding: 14px 16px;
      background: #0f0f18;
      border: 1px solid #2f2f50;
      border-radius: 16px;
      color: white;
      font-size: 16px;
      margin-bottom: 16px;
    }

    .modal-card button {
      width: 100%;
      padding: 16px;
      background: #7a5cff;
      border: none;
      border-radius: 18px;
      color: white;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .modal-card .secondary-btn {
      background: transparent;
      border: 1px solid #2f2f50;
      color: #b0b0d0;
    }

    .tab-header {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab-header button {
      flex: 1;
      background: transparent;
      border: none;
      color: #b0b0d0;
      font-size: 16px;
      padding: 10px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }

    .tab-header button.active {
      color: #7a5cff;
      border-bottom-color: #7a5cff;
    }

    .contact-item {
      display: flex;
      align-items: center;
      padding: 12px;
      border-radius: 16px;
      cursor: pointer;
      transition: 0.15s;
      margin-bottom: 8px;
      background: #25253f;
    }

    .contact-item:hover {
      background: #7a5cff;
    }

    .contact-item img {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      margin-right: 12px;
    }

    .contact-info h4 {
      color: white;
      font-weight: 500;
    }

    .contact-info p {
      color: #b0b0d0;
      font-size: 13px;
    }

    /* ========== ANIMATIONS ========== */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ========== SCROLLBAR ========== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #7a5cff; border-radius: 10px; }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 1000px) {
      .right-panel { width: 280px; }
    }
    @media (max-width: 768px) {
      #app { border-radius: 0; max-width: 100%; max-height: 100%; }
      .sidebar { width: 280px; }
      .right-panel { display: none; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    // ------------------------------------------------------------
    // Global state & config
    // ------------------------------------------------------------
    const API_BASE = '';
    let token = localStorage.getItem('token');
    let currentUser = null;
    try {
      currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
    } catch { currentUser = null; }

    let currentChat = null;               // { id, type, name, participants, ... }
    let chats = [];                       // from server + local bot
    let messagesByChat = {};               // { chatId: [messages] }
    let contacts = [];
    let socket = null;
    let emojiPicker = null;
    let replyTo = null;                    // { messageId, content }

    const BOT_ID = 'craheapp-bot';
    const BOT_NAME = 'CRAHEAPP.BOT';
    const BOT_AVATAR = '🤖';
    const FIRST_TIME_KEY = 'craheapp_first_time';

    // ------------------------------------------------------------
    // Helper: fetch with auth
    // ------------------------------------------------------------
    async function fetchWithAuth(url, options = {}) {
      const headers = {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json',
        ...options.headers,
      };
      const res = await fetch(url, { ...options, headers });
      if (res.status === 401) {
        localStorage.removeItem('token');
        localStorage.removeItem('currentUser');
        showAuthModal();
        throw new Error('Unauthorized');
      }
      return res;
    }

    // ------------------------------------------------------------
    // Auth modal (Login / Register)
    // ------------------------------------------------------------
    function showAuthModal() {
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.id = 'authModal';
      modal.innerHTML = `
        <div class="modal-card">
          <div class="tab-header">
            <button class="tab-btn active" data-tab="login">Login</button>
            <button class="tab-btn" data-tab="register">Register</button>
          </div>
          <div id="authContent">
            <input type="text" id="authUsername" placeholder="Username" autocomplete="off">
            <input type="password" id="authPassword" placeholder="Password">
            <div id="registerFields" style="display: none;">
              <input type="password" id="authConfirm" placeholder="Confirm password">
            </div>
          </div>
          <button id="authActionBtn">Login</button>
          <button class="secondary-btn" id="closeAuthModal">Cancel</button>
        </div>
      `;
      document.body.appendChild(modal);

      const loginTab = modal.querySelector('[data-tab="login"]');
      const regTab = modal.querySelector('[data-tab="register"]');
      const authAction = document.getElementById('authActionBtn');
      const authUsername = document.getElementById('authUsername');
      const authPassword = document.getElementById('authPassword');
      const authConfirm = document.getElementById('authConfirm');
      const registerFields = document.getElementById('registerFields');
      const closeBtn = document.getElementById('closeAuthModal');

      let isLogin = true;

      function setActive(tab) {
        modal.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        tab.classList.add('active');
        isLogin = tab === loginTab;
        authAction.textContent = isLogin ? 'Login' : 'Register';
        registerFields.style.display = isLogin ? 'none' : 'block';
      }

      loginTab.addEventListener('click', () => setActive(loginTab));
      regTab.addEventListener('click', () => setActive(regTab));

      authAction.addEventListener('click', async () => {
        const username = authUsername.value.trim();
        const password = authPassword.value;
        if (!username || !password) return alert('Fill all fields');
        if (!isLogin) {
          const confirm = authConfirm.value;
          if (password !== confirm) return alert('Passwords do not match');
        }

        const url = isLogin ? '/api/login' : '/api/register';
        try {
          const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Request failed');
          token = data.token;
          currentUser = data.user;
          localStorage.setItem('token', token);
          localStorage.setItem('currentUser', JSON.stringify(currentUser));
          modal.remove();
          initApp(); // restart app with new token
        } catch (err) {
          alert(err.message);
        }
      });

      closeBtn.addEventListener('click', () => modal.remove());
    }

    // ------------------------------------------------------------
    // App initialization
    // ------------------------------------------------------------
    function initApp() {
      if (!token || !currentUser) {
        showAuthModal();
        return;
      }

      // Connect socket
      socket = io({ auth: { token } });
      socket.on('message:new', (msg) => {
        if (msg.chatId === currentChat?.id) {
          if (!messagesByChat[msg.chatId]) messagesByChat[msg.chatId] = [];
          messagesByChat[msg.chatId].push(msg);
          renderMessages();
        }
        // Update last message in chat list
        const chat = chats.find(c => c.id === msg.chatId);
        if (chat) {
          chat.lastMessage = msg;
          renderChatList();
        }
      });

      socket.on('typing', ({ username, isTyping }) => {
        if (currentChat) {
          document.getElementById('headerStatus').textContent = isTyping ? `${username} typing...` : 'online';
        }
      });

      // Load initial data
      loadChats();
      loadContacts();

      // Render main UI
      renderApp();

      // Check first time to create bot greeting
      checkFirstTimeBot();
    }

    async function loadChats() {
      try {
        const res = await fetchWithAuth('/api/chats');
        const serverChats = await res.json();
        chats = serverChats; // from backend

        // Add local bot chat if not present
        if (!chats.find(c => c.id === BOT_ID)) {
          chats.unshift({
            id: BOT_ID,
            type: 'direct',
            name: BOT_NAME,
            participants: [currentUser.id, BOT_ID],
            avatar: BOT_AVATAR,
            lastMessage: null
          });
        }
        renderChatList();
      } catch (err) {
        console.error(err);
      }
    }

    async function loadContacts() {
      try {
        const res = await fetchWithAuth('/api/users');
        contacts = await res.json();
      } catch (err) {
        console.error(err);
      }
    }

    function checkFirstTimeBot() {
      if (!localStorage.getItem(FIRST_TIME_KEY)) {
        localStorage.setItem(FIRST_TIME_KEY, 'true');
        // Send welcome message from bot
        const welcomeMsg = {
          id: 'welcome-' + Date.now(),
          chatId: BOT_ID,
          senderId: BOT_ID,
          content: '👋 Привет! Я CRAHEAPP.BOT — твой AI помощник.\nЯ могу:\n• отвечать на вопросы\n• помогать с чатами\n• переводить текст\n• создавать идеи\n• помогать управлять группами',
          type: 'text',
          createdAt: new Date().toISOString(),
          reactions: {}
        };
        if (!messagesByChat[BOT_ID]) messagesByChat[BOT_ID] = [];
        messagesByChat[BOT_ID].push(welcomeMsg);
        const botChat = chats.find(c => c.id === BOT_ID);
        if (botChat) botChat.lastMessage = welcomeMsg;
        renderChatList();
      }
    }

    // ------------------------------------------------------------
    // Main UI render
    // ------------------------------------------------------------
    function renderApp() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <!-- Left Sidebar -->
        <div class="sidebar">
          <div class="sidebar-header">
            <span class="logo">Craheapp</span>
            <div class="sidebar-actions">
              <button id="newChatBtn"><i class="fas fa-plus"></i></button>
              <button id="settingsBtn"><i class="fas fa-cog"></i></button>
            </div>
          </div>
          <div class="sidebar-tabs">
            <button class="tab-btn active" data-tab="chats"><i class="fas fa-comment"></i> Chats</button>
            <button class="tab-btn" data-tab="contacts"><i class="fas fa-address-book"></i> Contacts</button>

        <!-- Main Chat Area -->

              <button id="attachBtn"><i class="fas fa-paperclip"></i></button>
              <button id="voiceBtn"><i class="fas fa-microphone"></i></button>

        <!-- Right Panel (AI / Info) -->

          <div class="panel-header">
            <h3><i class="fas fa-robot" style="color: #ff5ad6;"></i> CRAHEAPP.BOT</h3>
          </div>
          <div class="panel-content">
            <div class="ai-message">
              Ask me anything, translate, summarize, or generate text.
            </div>
            <button class="ai-button" id="aiSummarize"><i class="fas fa-align-left"></i> Summarize chat</button>
            <button class="ai-button" id="aiTranslate"><i class="fas fa-language"></i> Translate message</button>
            <button class="ai-button" id="aiSmartReply"><i class="fas fa-comment-dots"></i> Smart reply</button>
            <button class="ai-button" id="aiGenerate"><i class="fas fa-magic"></i> Generate text</button>
          </div>

      `;

      // Attach event listeners
      document.getElementById('newChatBtn').addEventListener('click', showNewChatModal);
      document.getElementById('settingsBtn').addEventListener('click', showSettingsModal);
      document.getElementById('callBtn').addEventListener('click', () => alert('Voice call - mock (WebRTC would be implemented)'));
      document.getElementById('videoCallBtn').addEventListener('click', () => alert('Video call - mock'));
      document.getElementById('aiToggleBtn').addEventListener('click', toggleRightPanel);
      document.getElementById('profileBtn').addEventListener('click', showProfileModal);
      document.getElementById('emojiBtn').addEventListener('click', showEmojiPicker);
      document.getElementById('attachBtn').addEventListener('click', attachFile);
      document.getElementById('voiceBtn').addEventListener('click', startVoiceRecording);
      document.getElementById('sendBtn').addEventListener('click', sendMessage);
      document.getElementById('messageInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
        if (currentChat) {
          socket.emit('typing', { chatId: currentChat.id, isTyping: true });
          clearTimeout(window.typingTimeout);
          window.typingTimeout = setTimeout(() => {
            socket.emit('typing', { chatId: currentChat.id, isTyping: false });
          }, 2000);
        }
      });
      document.getElementById('messageInput').addEventListener('input', () => {
        const sendBtn = document.getElementById('sendBtn');
        sendBtn.disabled = !(currentChat && document.getElementById('messageInput').value.trim());
      });
      document.getElementById('searchInput').addEventListener('input', filterChats);

      // Tab switching
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          const tab = e.target.dataset.tab;
          if (tab === 'chats') renderChatList();
          else if (tab === 'contacts') renderContactsList();
          else if (tab === 'calls') renderCallsList();
        });
      });

      // AI panel buttons
      document.getElementById('aiSummarize').addEventListener('click', async () => {
        if (!currentChat) return alert('Select a chat first');
        const msgs = messagesByChat[currentChat.id] || [];
        const res = await fetchWithAuth('/api/ai/summarize', {
          method: 'POST',
          body: JSON.stringify({ messages: msgs })
        });
        const data = await res.json();
        alert(data.summary);
      });
      document.getElementById('aiTranslate').addEventListener('click', async () => {
        const lang = prompt('Target language (e.g., en, ru):');
        const text = prompt('Text to translate:');
        if (!lang || !text) return;
        const res = await fetchWithAuth('/api/ai/translate', {
          method: 'POST',
          body: JSON.stringify({ text, targetLanguage: lang })
        });
        const data = await res.json();
        alert(data.translated);
      });
      document.getElementById('aiSmartReply').addEventListener('click', async () => {
        if (!currentChat) return alert('Select a chat first');
        const res = await fetchWithAuth('/api/ai/chat', {
          method: 'POST',
          body: JSON.stringify({ message: 'Generate reply', chatId: currentChat.id })
        });
        const data = await res.json();
        document.getElementById('messageInput').value = data.reply;
        document.getElementById('sendBtn').disabled = false;
      });
      document.getElementById('aiGenerate').addEventListener('click', async () => {
        const promptText = prompt('Enter a prompt:');
        if (!promptText) return;
        const res = await fetchWithAuth('/api/ai/generate', {
          method: 'POST',
          body: JSON.stringify({ prompt: promptText })
        });
        const data = await res.json();
        alert(data.generated);
      });

      // Initial render
      renderChatList();
      renderMessages();
    }

    // ------------------------------------------------------------
    // Sidebar list rendering
    // ------------------------------------------------------------
    function renderChatList() {
      const listEl = document.getElementById('chatList');
      if (!listEl) return;
      listEl.innerHTML = '';
      chats.forEach(chat => {
        const chatName = chat.name || (chat.participants?.find(p => p !== currentUser?.id) ? 'User' : 'Unknown');
        const lastMsg = chat.lastMessage?.content || 'No messages';
        const time = chat.lastMessage ? new Date(chat.lastMessage.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
        const avatar = chat.id === BOT_ID ? BOT_AVATAR : (chat.avatar || `https://ui-avatars.com/api/?name=${chatName}&background=7a5cff&color=fff`);
        const item = document.createElement('div');
        item.className = `chat-item ${currentChat?.id === chat.id ? 'active' : ''}`;
        item.dataset.id = chat.id;
        item.innerHTML = `
          <div class="chat-avatar">${avatar.startsWith('http') ? `<img src="${avatar}">` : avatar}</div>
          <div class="chat-info">
            <div class="chat-name">${chatName}</div>
            <div class="chat-last-msg">${lastMsg}</div>
          </div>
          <div class="chat-time">${time}</div>
        `;
        item.addEventListener('click', () => selectChat(chat));
        listEl.appendChild(item);
      });
    }

    function renderContactsList() {
      const listEl = document.getElementById('chatList');
      listEl.innerHTML = '';
      contacts.forEach(user => {
        if (user.id === currentUser.id) return;
        const item = document.createElement('div');
        item.className = 'chat-item';
        item.innerHTML = `
          <div class="chat-avatar"><img src="${user.avatar || `https://ui-avatars.com/api/?name=${user.username}&background=7a5cff&color=fff`}"></div>
          <div class="chat-info">
            <div class="chat-name">${user.username}</div>
            <div class="chat-last-msg">${user.bio || 'Hey there!'}</div>
          </div>
        `;
        item.addEventListener('click', () => startDirectChat(user));
        listEl.appendChild(item);
      });
    }

    function renderCallsList() {
      const listEl = document.getElementById('chatList');
      listEl.innerHTML = '<div style="color: #b0b0d0; text-align: center; margin-top: 30px;">Call history will appear here</div>';
    }

    function filterChats() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      // For simplicity, just re-render chats (could filter)
      renderChatList();
    }

    // ------------------------------------------------------------
    // Chat selection
    // ------------------------------------------------------------
    function selectChat(chat) {
      currentChat = chat;
      document.getElementById('headerName').textContent = chat.name || 'Chat';
      const avatarEl = document.getElementById('headerAvatar');
      if (chat.id === BOT_ID) {
        avatarEl.innerHTML = '<span style="font-size: 28px;">🤖</span>';
      } else {
        avatarEl.innerHTML = `<img src="${chat.avatar || `https://ui-avatars.com/api/?name=${chat.name}&background=7a5cff&color=fff`}">`;
      }
      document.getElementById('headerStatus').textContent = 'online';
      document.getElementById('messageInput').disabled = false;
      document.getElementById('messageInput').focus();

      // Load messages
      if (chat.id === BOT_ID) {
        // local bot messages
        if (!messagesByChat[BOT_ID]) messagesByChat[BOT_ID] = [];
        renderMessages();
      } else {
        fetchWithAuth(`/api/messages/${chat.id}`)
          .then(res => res.json())
          .then(msgs => {
            messagesByChat[chat.id] = msgs;
            renderMessages();
          })
          .catch(err => console.error(err));
      }

      // Join socket room
      if (socket) socket.emit('joinChat', chat.id);

      // Update chat list active state
      renderChatList();
    }

    function renderMessages() {
      const container = document.getElementById('messagesContainer');
      if (!currentChat) {
        container.innerHTML = `
          <div class="empty-chat">
            <i class="fas fa-comments"></i>
            <h2>Welcome to Craheapp</h2>
            <p>Select a chat or start a new conversation</p>
            <button onclick="document.getElementById('newChatBtn').click()">Start chat</button>
          </div>
        `;
        return;
      }
      const msgs = messagesByChat[currentChat.id] || [];
      container.innerHTML = '';
      msgs.forEach(msg => {
        const div = document.createElement('div');
        div.className = `message ${msg.senderId === currentUser.id ? 'sent' : 'received'}`;
        const time = new Date(msg.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        let mediaHtml = '';
        if (msg.type === 'image' && msg.mediaUrl) {
          mediaHtml = `<img src="${msg.mediaUrl}" class="message-media" onclick="window.open('${msg.mediaUrl}')">`;
        } else if (msg.type === 'video' && msg.mediaUrl) {
          mediaHtml = `<video src="${msg.mediaUrl}" controls class="message-media"></video>`;
        } else if (msg.type === 'file' && msg.mediaUrl) {
          mediaHtml = `<a href="${msg.mediaUrl}" target="_blank" class="message-media"><i class="fas fa-file"></i> ${msg.mediaUrl.split('/').pop()}</a>`;
        } else if (msg.type === 'voice' && msg.mediaUrl) {
          mediaHtml = `<audio src="${msg.mediaUrl}" controls></audio>`;
        }
        const replyHtml = msg.replyTo ? `<div class="message-reply">Replying to a message</div>` : '';
        const reactionsHtml = Object.entries(msg.reactions || {}).map(([emoji, users]) =>
          `<span class="reaction" onclick="addReaction('${msg.id}', '${emoji}')">${emoji} ${users.length}</span>`
        ).join('');
        div.innerHTML = `
          <div class="message-bubble">
            ${replyHtml}
            ${mediaHtml}
            <span>${msg.content || ''}</span>
            <div class="message-time">${time} ${msg.edited ? '(edited)' : ''}</div>
            <div class="message-reactions">${reactionsHtml}</div>
          </div>
        `;
        container.appendChild(div);
      });
      container.scrollTop = container.scrollHeight;
    }

    // ------------------------------------------------------------
    // Message sending
    // ------------------------------------------------------------
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text || !currentChat) return;

      if (currentChat.id === BOT_ID) {
        // Local bot handling
        const userMsg = {
          id: 'msg-' + Date.now(),
          chatId: BOT_ID,
          senderId: currentUser.id,
          content: text,
          type: 'text',
          createdAt: new Date().toISOString(),
          reactions: {}
        };
        if (!messagesByChat[BOT_ID]) messagesByChat[BOT_ID] = [];
        messagesByChat[BOT_ID].push(userMsg);
        renderMessages();

        // Call AI API
        try {
          const res = await fetchWithAuth('/api/ai/chat', {
            method: 'POST',
            body: JSON.stringify({ message: text, chatId: BOT_ID })
          });
          const data = await res.json();
          const botMsg = {
            id: 'msg-' + Date.now() + 1,
            chatId: BOT_ID,
            senderId: BOT_ID,
            content: data.reply,
            type: 'text',
            createdAt: new Date().toISOString(),
            reactions: {}
          };
          messagesByChat[BOT_ID].push(botMsg);
          renderMessages();
        } catch (err) {
          console.error(err);
        }
      } else {
        // Send to server
        try {
          const payload = {
            chatId: currentChat.id,
            content: text,
            type: 'text',
            replyTo: replyTo?.messageId || null
          };
          const res = await fetchWithAuth('/api/messages', { method: 'POST', body: JSON.stringify(payload) });
          const newMsg = await res.json();
          if (!messagesByChat[currentChat.id]) messagesByChat[currentChat.id] = [];
          messagesByChat[currentChat.id].push(newMsg);
          renderMessages();
        } catch (err) {
          console.error(err);
        }
      }
      input.value = '';
      document.getElementById('sendBtn').disabled = true;
      replyTo = null; // clear reply after send
    }

    // ------------------------------------------------------------
    // New chat / group / channel modals
    // ------------------------------------------------------------
    function showNewChatModal() {
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal-card">
          <h2>New Chat</h2>
          <button id="newPrivateBtn"><i class="fas fa-user"></i> Private chat</button>
          <button id="newGroupBtn"><i class="fas fa-users"></i> New group</button>
          <button id="newChannelBtn"><i class="fas fa-bullhorn"></i> New channel</button>
          <button class="secondary-btn" id="closeModalBtn">Cancel</button>
        </div>
      `;
      document.body.appendChild(modal);
      document.getElementById('newPrivateBtn').addEventListener('click', () => {
        modal.remove();
        showContactPicker();
      });
      document.getElementById('newGroupBtn').addEventListener('click', () => {
        modal.remove();
        showCreateGroupModal();
      });
      document.getElementById('newChannelBtn').addEventListener('click', () => {
        modal.remove();
        showCreateChannelModal();
      });
      document.getElementById('closeModalBtn').addEventListener('click', () => modal.remove());
    }

    function showContactPicker() {
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal-card" style="width: 500px;">
          <h2>Select contact</h2>
          <div style="max-height: 300px; overflow-y: auto;" id="contactList"></div>
          <button class="secondary-btn" id="closeContactPicker">Cancel</button>
        </div>
      `;
      document.body.appendChild(modal);
      const listDiv = document.getElementById('contactList');
      contacts.forEach(user => {
        if (user.id === currentUser.id) return;
        const btn = document.createElement('button');
        btn.style.marginBottom = '8px';
        btn.innerHTML = `<i class="fas fa-user"></i> ${user.username}`;
        btn.addEventListener('click', async () => {
          // Check if chat already exists
          const existing = chats.find(c => c.type === 'direct' && c.participants?.includes(user.id));
          if (existing) {
            selectChat(existing);
          } else {
            // Create new direct chat
            const res = await fetchWithAuth('/api/chats', {
              method: 'POST',
              body: JSON.stringify({ type: 'direct', participants: [currentUser.id, user.id] })
            });
            const chat = await res.json();
            chats.push(chat);
            renderChatList();
            selectChat(chat);
          }
          modal.remove();
        });
        listDiv.appendChild(btn);
      });
      document.getElementById('closeContactPicker').addEventListener('click', () => modal.remove());
    }

    function showCreateGroupModal() {
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal-card">
          <h2>Create Group</h2>
          <input type="text" id="groupName" placeholder="Group name">
          <textarea id="groupDesc" placeholder="Description" rows="3"></textarea>
          <button id="createGroupBtn">Create</button>
          <button class="secondary-btn" id="closeGroupModal">Cancel</button>
        </div>
      `;
      document.body.appendChild(modal);
      document.getElementById('createGroupBtn').addEventListener('click', async () => {
        const name = document.getElementById('groupName').value.trim();
        if (!name) return alert('Group name required');
        const res = await fetchWithAuth('/api/chats', {
          method: 'POST',
          body: JSON.stringify({ type: 'group', name, participants: [currentUser.id] })
        });
        const chat = await res.json();
        chats.push(chat);
        renderChatList();
        modal.remove();
        selectChat(chat);
      });
      document.getElementById('closeGroupModal').addEventListener('click', () => modal.remove());
    }

    function showCreateChannelModal() {
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal-card">
          <h2>Create Channel</h2>
          <input type="text" id="channelName" placeholder="Channel name">
          <textarea id="channelDesc" placeholder="Description" rows="3"></textarea>
          <button id="createChannelBtn">Create</button>
          <button class="secondary-btn" id="closeChannelModal">Cancel</button>
        </div>
      `;
      document.body.appendChild(modal);
      document.getElementById('createChannelBtn').addEventListener('click', async () => {
        const name = document.getElementById('channelName').value.trim();
        if (!name) return alert('Channel name required');
        const res = await fetchWithAuth('/api/channels', {
          method: 'POST',
          body: JSON.stringify({ name, description: document.getElementById('channelDesc').value })
        });
        const channel = await res.json();
        const chat = {
          id: channel.id,
          type: 'channel',
          name: channel.name,
          participants: [currentUser.id],
          lastMessage: null
        };
        chats.push(chat);
        renderChatList();
        modal.remove();
        selectChat(chat);
      });
      document.getElementById('closeChannelModal').addEventListener('click', () => modal.remove());
    }

    // ------------------------------------------------------------
    // Emoji picker
    // ------------------------------------------------------------
    function showEmojiPicker() {
      if (!emojiPicker) {
        emojiPicker = document.createElement('emoji-picker');
        emojiPicker.style.position = 'absolute';
        emojiPicker.style.bottom = '80px';
        emojiPicker.style.right = '20px';
        emojiPicker.style.zIndex = '3000';
        emojiPicker.addEventListener('emoji-click', event => {
          const input = document.getElementById('messageInput');
          input.value += event.detail.unicode;
          input.dispatchEvent(new Event('input'));
          emojiPicker.remove();
          emojiPicker = null;
        });
        document.body.appendChild(emojiPicker);
      } else {
        emojiPicker.remove();
        emojiPicker = null;
      }
    }

    // ------------------------------------------------------------
    // File attachment
    // ------------------------------------------------------------
    function attachFile() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*,video/*,audio/*,application/pdf';
      input.onchange = async () => {
        const file = input.files[0];
        if (!file || !currentChat) return;
        const formData = new FormData();
        formData.append('file', file);
        const res = await fetchWithAuth('/api/upload', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` }, // no Content-Type
          body: formData
        });
        const data = await res.json();
        // Determine message type
        let type = 'file';
        if (file.type.startsWith('image/')) type = 'image';
        else if (file.type.startsWith('video/')) type = 'video';
        else if (file.type.startsWith('audio/')) type = 'voice';
        const payload = {
          chatId: currentChat.id,
          content: '',
          type,
          mediaUrl: data.url,
          replyTo: replyTo?.messageId || null
        };
        const msgRes = await fetchWithAuth('/api/messages', { method: 'POST', body: JSON.stringify(payload) });
        const newMsg = await msgRes.json();
        if (!messagesByChat[currentChat.id]) messagesByChat[currentChat.id] = [];
        messagesByChat[currentChat.id].push(newMsg);
        renderMessages();
      };
      input.click();
    }

    // ------------------------------------------------------------
    // Voice message recording (mock)
    // ------------------------------------------------------------
    function startVoiceRecording() {
      alert('Voice recording would start here (MediaRecorder API) – mock');
    }

    // ------------------------------------------------------------
    // Right panel toggle
    // ------------------------------------------------------------
    function toggleRightPanel() {
      const panel = document.getElementById('rightPanel');
      panel.classList.toggle('hidden');
    }

    // ------------------------------------------------------------
    // Direct chat starter
    // ------------------------------------------------------------
    function startDirectChat(user) {
      const existing = chats.find(c => c.type === 'direct' && c.participants?.includes(user.id));
      if (existing) {
        selectChat(existing);
      } else {
        // Create new direct chat
        fetchWithAuth('/api/chats', {
          method: 'POST',
          body: JSON.stringify({ type: 'direct', participants: [currentUser.id, user.id] })
        })
          .then(res => res.json())
          .then(chat => {
            chats.push(chat);
            renderChatList();
            selectChat(chat);
          });
      }
    }

    // ------------------------------------------------------------
    // Reaction helper (global for onclick)
    // ------------------------------------------------------------
    window.addReaction = async function(messageId, emoji) {
      if (!currentChat) return;
      await fetchWithAuth(`/api/messages/${messageId}/reactions`, {
        method: 'POST',
        body: JSON.stringify({ emoji, action: 'add' })
      });
      // Reload messages for current chat
      const msgs = await fetchWithAuth(`/api/messages/${currentChat.id}`).then(r => r.json());
      messagesByChat[currentChat.id] = msgs;
      renderMessages();
    };

    // ------------------------------------------------------------
    // Start
    // ------------------------------------------------------------
    initApp();
  </script>
