    async function register() {
        const username = document.getElementById('reg-username').value.trim();
        const password = document.getElementById('reg-password').value;
        const password2 = document.getElementById('reg-password2').value;

        if (!username || !password || !password2) { showAlert('Заполните все поля'); return; }
        if (password !== password2) { showAlert('Пароли не совпадают'); return; }

        const res = await fetch(API_URL + '/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, name: username })
        });
        const data = await res.json();
        if (!res.ok) { showAlert(data.error); return; }

        appState.token = data.token;
        appState.currentAccount = data.user.id;
        appState.me = data.user;
        localStorage.setItem('token', data.token);
        await loadUserData();
        showMainScreen();
    }

    async function login() {
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;

        const res = await fetch(API_URL + '/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })

        appState.token = data.token;
        appState.currentAccount = data.user.id;
        appState.me = data.user;
        localStorage.setItem('token', data.token);
        await loadUserData();
        showMainScreen();
    }

    async function loadUserData() {
        // Загружаем список всех пользователей
        const usersRes = await fetch(API_URL + '/api/users', {
            headers: { 'Authorization': 'Bearer ' + appState.token }
        });
        if (usersRes.ok) {
            appState.allUsers = await usersRes.json();
        }

        // Загружаем публичные чаты
        const pubRes = await fetch(API_URL + '/api/public-chats', {
            headers: { 'Authorization': 'Bearer ' + appState.token }
        });
        if (pubRes.ok) {
            appState.publicChats = await pubRes.json();
        }

        // Загружаем чаты пользователя
        const chatsRes = await fetch(API_URL + '/api/chats', {
            headers: { 'Authorization': 'Bearer ' + appState.token }
        });
        if (chatsRes.ok) {
            appState.chats = await chatsRes.json();
        }

        // Для каждого чата загружаем сообщения
        for (let chat of appState.chats) {
            const msgRes = await fetch(API_URL + '/api/chats/' + chat.id + '/messages', {
                headers: { 'Authorization': 'Bearer ' + appState.token }
            });
            if (msgRes.ok) {
                appState.messages[chat.id] = await msgRes.json();
            }
        }

        // Загружаем папки (локально)
        const folders = localStorage.getItem('folders_' + appState.currentAccount);
        appState.folders = folders ? JSON.parse(folders) : [];
    }

    function showMainScreen() {
        document.getElementById('auth-screen').classList.remove('active');
        document.getElementById('main-screen').classList.add('active');

        renderContacts();
        updateRecentChats();
        renderFoldersRow();
        document.body.classList.toggle('pc-mode', appState.desktopMode && !appState.isMobile);
        document.body.classList.toggle('mobile-mode', !appState.desktopMode || appState.isMobile);
        requestNotificationPermission();
        connectSocket();
    }

    // ==================== СОКЕТ ====================
    function connectSocket() {
        if (appState.socket) return;
        if (typeof io === 'undefined') { console.warn('Socket.IO не подключён'); return; }
        appState.socket = io({ auth: { token: appState.token } });
        appState.socket.on('newMessage', (msg) => {
            if (!appState.messages[msg.chatId]) appState.messages[msg.chatId] = [];
            appState.messages[msg.chatId].push(msg);
            if (appState.currentChatId === msg.chatId) {
                if (appState.desktopMode && !appState.isMobile) renderMessagesPC(msg.chatId);
                else renderMessages(msg.chatId);
            } else {
                const chat = appState.chats.find(c => c.id === msg.chatId);
                if (chat) {
                    chat.lastMessage = msg.content.length > 30 ? msg.content.slice(0,30)+'…' : msg.content;
                    chat.lastTime = msg.time;
                    renderChats();
                }
            }
        });
        appState.socket.on('userTyping', ({ chatId, username, isTyping }) => {
            if (appState.currentChatId === chatId) {
                const statusEl = appState.desktopMode && !appState.isMobile ? document.getElementById('pc-chat-header-status') : document.getElementById('chat-header-status');
                statusEl.innerText = isTyping ? `${username} печатает...` : 'онлайн';
            }
        });
        if (appState.currentChatId) {
            appState.socket.emit('joinChat', appState.currentChatId);
        }
    }

    async function globalSearch() {
        const query = document.getElementById('global-search').value.toLowerCase();
        if (query.length < 2) {
            renderChats();
            renderContacts();
            appState.searchResults = [];
            return;
        }
        const results = [];
        // Ищем среди загруженных пользователей
        appState.allUsers.forEach(user => {
            if (user.id !== appState.currentAccount && (user.username.toLowerCase().includes(query) || user.name.toLowerCase().includes(query))) {
                results.push({ type: 'user', userId: user.id, user });
            }
        });
        // Ищем среди публичных чатов
        appState.publicChats.forEach(pub => {
            if (pub.name.toLowerCase().includes(query)) {
                results.push({ type: 'public', publicId: pub.id, pub });
            }
        });
        // Ищем в сообщениях (локально)
        Object.entries(appState.messages).forEach(([chatId, msgs]) => {
            msgs.forEach(msg => {
                if (msg.content.toLowerCase().includes(query)) {
                    results.push({ type: 'message', chatId, msgId: msg.id, content: msg.content });
                }
            });
        });
        appState.searchResults = results;
        renderSearchResults(results);
    }

    function renderSearchResults(results) {
        const list = document.getElementById('chats-list');
        list.innerHTML = '';
        results.forEach(r => {
            if (r.type === 'user') {
                const user = r.user;
                const item = document.createElement('div');
                item.className = 'chat-item';
                item.onclick = () => openPrivateChat(user.id);
                item.innerHTML = `<div class="chat-avatar">${user.avatar}</div><div class="chat-info"><div class="chat-name">${user.name}</div><div class="chat-last-msg">@${user.username}</div></div>`;
                list.appendChild(item);
            } else if (r.type === 'public') {
                const pub = r.pub;
                const item = document.createElement('div');
                item.className = 'chat-item';
                item.onclick = () => joinPublicChat(pub.id);
                item.innerHTML = `<div class="chat-avatar">${pub.avatar}</div><div class="chat-info"><div class="chat-name">${pub.name}</div><div class="chat-last-msg">${pub.description || 'Публичный канал'}</div></div>`;
                list.appendChild(item);
            } else if (r.type === 'message') {
                const chat = appState.chats.find(c => c.id === r.chatId);
                if (!chat) return;
                const item = document.createElement('div');
                item.className = 'chat-item';
                item.onclick = () => openChatWithHighlight(r.chatId, r.msgId);
                item.innerHTML = `<div class="chat-avatar">${chat.avatar}</div><div class="chat-info"><div class="chat-name">${chat.name}</div><div class="chat-last-msg">${r.content.substring(0,50)}...</div></div>`;
                list.appendChild(item);
            }
        });
        if (results.length === 0) list.innerHTML = '<div style="text-align:center; padding:20px;">Ничего не найдено</div>';
    }

    async function joinPublicChat(publicId) {
        const pub = appState.publicChats.find(p => p.id === publicId);
        if (!pub) return;
        let existing = appState.chats.find(c => c.id === publicId);
        if (existing) {
            openChat(publicId);
            return;
        }
        const newChat = {
            id: pub.id,
            type: pub.type,
            name: pub.name,
            avatar: pub.avatar,
            participants: [appState.currentAccount, ...(pub.participants || [])],
            lastMessage: pub.lastMessage || '',
            lastTime: pub.lastTime || Date.now(),
            unread: 0,
            pinned: false,
            public: true,
            description: pub.description
        };
        appState.chats.push(newChat);
        const msgRes = await fetch(API_URL + '/api/chats/' + pub.id + '/messages', {
            headers: { 'Authorization': 'Bearer ' + appState.token }
        });
        if (msgRes.ok) {
            appState.messages[pub.id] = await msgRes.json();
        }
        openChat(pub.id);
    }

    async function openPrivateChat(userId) {
        let chat = appState.chats.find(c => c.type === 'private' && c.participants.includes(userId) && c.participants.includes(appState.currentAccount));
        if (!chat) {
            const user = appState.allUsers.find(u => u.id === userId);
            if (!user) return;
            const res = await fetch(API_URL + '/api/chats', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + appState.token
                },
                body: JSON.stringify({
                    type: 'private',
                    name: user.name,
                    avatar: user.avatar,
                    participants: [userId]
                })
            });
            if (!res.ok) { showAlert('Не удалось создать чат'); return; }
            chat = await res.json();
            appState.chats.push(chat);
            appState.messages[chat.id] = [];
        }
        openChat(chat.id);
    }

    async function openChat(chatId) {
        appState.currentChatId = chatId;
        const chat = appState.chats.find(c => c.id === chatId);
        if (!chat) return;

        appState.recentChats = [chatId, ...appState.recentChats.filter(id => id !== chatId)].slice(0, 5);
        updateRecentChats();

        if (appState.socket) {
            appState.socket.emit('joinChat', chatId);
        }

        if (appState.desktopMode && !appState.isMobile) {
            document.getElementById('chat-panel').style.display = 'flex';
            document.getElementById('pc-chat-header-name').innerText = chat.name;
            document.getElementById('pc-chat-header-status').innerText = 'онлайн';
            renderMessagesPC(chatId);
        } else {
            document.getElementById('chat-header-name').innerText = chat.name;
            document.getElementById('chat-header-status').innerText = 'онлайн';
            renderMessages(chatId);
            showScreen('chat-window');
        }
    }

    function closeChat() {
        if (appState.socket && appState.currentChatId) {
            appState.socket.emit('leaveChat', appState.currentChatId);
        }
        appState.currentChatId = null;
        if (appState.desktopMode && !appState.isMobile) {
            document.getElementById('chat-panel').style.display = 'none';
        } else {
            goBack();
        }
        renderChats();
    }

    async function sendMessage(isPC) {
        const inputId = isPC ? 'pc-message-input' : 'message-input';
        const input = document.getElementById(inputId);
        const content = input.value.trim();
        if (!content || !appState.currentChatId) return;

        const res = await fetch(API_URL + '/api/chats/' + appState.currentChatId + '/messages', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + appState.token
            },
            body: JSON.stringify({ content, type: 'text' })
        });
        if (res.ok) {
            const newMsg = await res.json();
            if (!appState.messages[appState.currentChatId]) appState.messages[appState.currentChatId] = [];
            appState.messages[appState.currentChatId].push(newMsg);
            if (isPC) renderMessagesPC(appState.currentChatId); else renderMessages(appState.currentChatId);
            input.value = '';
            document.getElementById(isPC ? 'pc-send-btn' : 'send-btn').className = 'voice-btn';
            document.getElementById(isPC ? 'pc-send-btn' : 'send-btn').innerText = '🎤';
        } else {
            showAlert('Ошибка отправки');
        }
    }

    async function createPoll() {
        const question = document.getElementById('poll-question').value.trim();
        if (!question) { showAlert('Введите вопрос'); return; }
        const options = [];
        document.querySelectorAll('#poll-options input').forEach(inp => {
            if (inp.value.trim()) options.push(inp.value.trim());
        });
        if (options.length < 2) { showAlert('Добавьте минимум 2 варианта'); return; }
        const multiple = document.getElementById('poll-multiple').checked;
        const quiz = document.getElementById('poll-quiz').checked;
        const pollMsg = {
            type: 'poll',
            pollQuestion: question,
            pollOptions: options,
            pollMultiple: multiple,
            pollQuiz: quiz
        };
        const res = await fetch(API_URL + '/api/chats/' + appState.currentChatId + '/messages', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + appState.token
            },
            body: JSON.stringify(pollMsg)
        });
        if (res.ok) {
            const newMsg = await res.json();
            appState.messages[appState.currentChatId].push(newMsg);
            if (appState.desktopMode && !appState.isMobile) renderMessagesPC(appState.currentChatId);
            else renderMessages(appState.currentChatId);
            hidePollScreen();
        }
    }

    // ==================== МОИ КАНАЛЫ И ГРУППЫ ====================
    function showMyChats() {
        const list = document.getElementById('my-chats-list');
        list.innerHTML = '';
        const myChats = appState.chats.filter(c => (c.type === 'group' || c.type === 'channel') && c.owner === appState.currentAccount);
        if (myChats.length === 0) {
            list.innerHTML = '<div style="text-align:center; padding:20px;">Вы ещё не создали ни одной группы или канала.</div>';
        } else {
            myChats.forEach(chat => {
                const div = document.createElement('div');
                div.className = 'chat-item';
                div.onclick = () => { hideMyChats(); openChat(chat.id); };
                div.innerHTML = `
                    <div class="chat-avatar">${chat.avatar}</div>
                    <div class="chat-info">
                        <div class="chat-name">${chat.name}</div>
                        <div class="chat-last-msg">${chat.type === 'group' ? 'Группа' : 'Канал'}</div>
                    </div>
                `;
                list.appendChild(div);
            });
        }
        showScreen('my-chats-screen');
    }
    function hideMyChats() { goBack(); }

    async function createGroupFinal() {
        const name = document.getElementById('create-group-name').value.trim();
        if (!name) { showAlert('Введите название'); return; }
        const description = document.getElementById('create-group-description').value.trim();
        const privacy = appState.groupPrivacy;
        const permissions = appState.groupType === 'group' ? {
            sendMsg: document.getElementById('perm-send-msg').checked,
            sendMedia: document.getElementById('perm-send-media').checked,
            addMembers: document.getElementById('perm-add-members').checked,
            pin: document.getElementById('perm-pin').checked
        } : null;

        const newChat = {
            type: appState.groupType,
            name,
            avatar: appState.groupAvatar,
            participants: appState.selectedParticipants,
            description,
            privacy,
            permissions,
            owner: appState.currentAccount
        };

        const res = await fetch(API_URL + '/api/chats', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + appState.token
            },
            body: JSON.stringify(newChat)
        });
        if (!res.ok) { showAlert('Ошибка создания'); return; }
        const chat = await res.json();
        appState.chats.push(chat);
        appState.messages[chat.id] = [];

        if (chat.public) {
            appState.publicChats.push({
                id: chat.id,
                type: chat.type,
                name: chat.name,
                avatar: chat.avatar,
                description: chat.description,
                participants: chat.participants,
                owner: chat.owner
            });
        }

        hideCreateGroupDetail();
        hideCreateGroupType();
        renderChats();
        renderFoldersRow();
        goBack();
    }

    // ==================== ИНИЦИАЛИЗАЦИЯ ====================
    document.addEventListener('DOMContentLoaded', async () => {
        applyThemeAndWallpaper();
        if (appState.token) {
            try {
                await loadUserData();
                showMainScreen();
            } catch (e) {
                console.error('Ошибка загрузки данных', e);
                localStorage.removeItem('token');
                document.getElementById('auth-screen').classList.add('active');
            }
        } else {
            document.getElementById('auth-screen').classList.add('active');
        }
        renderFoldersRow();
        requestNotificationPermission();
        window.addEventListener('resize', () => {
            appState.isMobile = window.innerWidth < 768;
            document.body.classList.toggle('pc-mode', appState.desktopMode && !appState.isMobile);
            document.body.classList.toggle('mobile-mode', !appState.desktopMode || appState.isMobile);
            updateRecentChats();
        });
    });

    function saveState() {
        localStorage.setItem('folders_' + appState.currentAccount, JSON.stringify(appState.folders));
        localStorage.setItem('theme', appState.theme);
        localStorage.setItem('wallpaper', appState.wallpaper);
        localStorage.setItem('desktopMode', appState.desktopMode);
