<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Secure Messenger</title>
<script src="/socket.io/socket.io.js"></script>
<style>
body { font-family: Arial; background:#0f172a; color:white; margin:0; }
#auth, #chat { padding:20px; }
input, select { padding:8px; margin:5px; }
button { padding:8px 12px; cursor:pointer; }
#messages { height:400px; overflow-y:auto; border:1px solid #334155; padding:10px; }
.msg { margin:6px 0; }
.me { color:#22c55e; }
.ai { color:#38bdf8; }
</style>
</head>
<body>

<div id="auth">
<h2>Login / Register</h2>
<input id="username" placeholder="Username" />
<input id="password" type="password" placeholder="Password" />
<input id="deviceName" placeholder="Device Name" />
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<div id="chat" style="display:none;">
<h2>Messenger</h2>

<div>
<select id="assistant">
<option value="general">General AI</option>
<option value="coder">Code AI</option>
<option value="analyst">Analyst AI</option>
</select>

<input id="toUser" placeholder="Send to (userId or AI id)" />
<button onclick="loadHistory()">Load History</button>
</div>

<div id="messages"></div>

<input id="messageInput" placeholder="Type message..." />
<button onclick="sendMessage()">Send</button>
<button onclick="logout()">Logout</button>
</div>

<script>
let accessToken = localStorage.getItem("accessToken")
let refreshToken = localStorage.getItem("refreshToken")
let socket = null
let currentUserId = null

const AI_USER_ID = "00000000-0000-0000-0000-000000000001"

async function api(path, data) {
  const res = await fetch(path, {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": accessToken ? "Bearer " + accessToken : ""
    },
    body: JSON.stringify(data)
  })
  return res.json()
}

async function register() {
  const username = usernameInput.value
  const password = passwordInput.value
  const deviceName = deviceNameInput.value

  const res = await api("/auth/register",{username,password,deviceName})
  if(res.accessToken){
    saveTokens(res)
    initSocket()
  }
}

async function login() {
  const username = usernameInput.value
  const password = passwordInput.value
  const deviceName = deviceNameInput.value

  const res = await api("/auth/login",{username,password,deviceName})
  if(res.accessToken){
    saveTokens(res)
    initSocket()
  }
}

function saveTokens(res){
  accessToken = res.accessToken
  refreshToken = res.refreshToken
  localStorage.setItem("accessToken",accessToken)
  localStorage.setItem("refreshToken",refreshToken)
}

async function refreshAccessToken(){
  const res = await fetch("/auth/refresh",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({refreshToken})
  })
  const data = await res.json()
  if(data.accessToken){
    accessToken=data.accessToken
    localStorage.setItem("accessToken",accessToken)
  }
}

function initSocket(){
  socket = io({
    auth:{ token: accessToken }
  })

  socket.on("connect",()=>{
    document.getElementById("auth").style.display="none"
    document.getElementById("chat").style.display="block"
  })

  socket.on("message",(msg)=>{
    addMessage(msg.senderId,msg.content)
  })

  socket.on("disconnect", async ()=>{
    await refreshAccessToken()
  })
}

function loadHistory(){
  const withUser = document.getElementById("toUser").value
  socket.emit("loadHistory",{withUser},(res)=>{
    if(res.success){
      messages.innerHTML=""
      res.messages.forEach(m=>{
        addMessage(m.sender_id,m.content)
      })
    }
  })
}

function sendMessage(){
  const to = document.getElementById("toUser").value
  const content = document.getElementById("messageInput").value
  const assistantType = document.getElementById("assistant").value

  socket.emit("sendMessage",{to,content,assistantType},(res)=>{
    if(res.success){
      addMessage("me",content)
      messageInput.value=""
    }
  })
}function addMessage(sender,text){
  const div=document.createElement("div")
  div.classList.add("msg")
  if(sender==="me") div.classList.add("me")
  if(sender===AI_USER_ID) div.classList.add("ai")
  div.textContent = sender + ": " + text
  messages.appendChild(div)
  messages.scrollTop = messages.scrollHeight
}

function logout(){
  localStorage.clear()
  location.reload()
}

if(accessToken){
  initSocket()
}
</script>
</body>
</html>
